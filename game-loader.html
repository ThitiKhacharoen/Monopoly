<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Game...</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: white;
            color: black;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .timer {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Game Loader - Debug Mode</h1>
        
        <div class="status">
            <strong>GAME MODE DETECTED:</strong> <span id="gameMode">CHECKING...</span>
        </div>
        
        <div class="status">
            <strong>STATUS:</strong> <span id="implementationStatus">CHECKING...</span>
        </div>
        
        <div class="timer" id="timerDisplay"></div>
        
        <div class="status">
            <strong>ACTION:</strong> <span id="actionMessage">Analyzing...</span>
        </div>
        
        <div class="debug-info">
            <strong>DEBUG INFO:</strong><br>
            <div id="debugInfo"></div>
        </div>
    </div>

    <script>
        // Check game mode
        const mode = localStorage.getItem('monopoly-game-mode') || 'NONE';
        const localPlayers = localStorage.getItem('monopoly-players');
        const onlineGame = localStorage.getItem('monopoly-online-game');
        
        // Implementation status
        const implementations = {
            'local': true,
            'online': false,  // Set to true when Phase 2 is complete
            'ai': false
        };
        
        // Display game mode
        document.getElementById('gameMode').textContent = mode.toUpperCase();
        
        // Check if implemented
        const isImplemented = implementations[mode.toLowerCase()] || false;
        const statusEl = document.getElementById('implementationStatus');
        
        if (isImplemented) {
            statusEl.textContent = 'IMPLEMENTED - READY TO PLAY';
        } else {
            statusEl.textContent = 'NOT YET IMPLEMENTED';
        }
        
        // Debug info
        let debugHTML = `Mode: ${mode}<br>`;
        debugHTML += `Local Players Data: ${localPlayers ? 'EXISTS' : 'MISSING'}<br>`;
        debugHTML += `Online Game Data: ${onlineGame ? 'EXISTS' : 'MISSING'}<br>`;
        
        if (localPlayers) {
            try {
                const players = JSON.parse(localPlayers);
                debugHTML += `Local Players Count: ${players.length}<br>`;
                debugHTML += `Players: ${players.map(p => p.name).join(', ')}<br>`;
            } catch (e) {
                debugHTML += `Local Players: PARSE ERROR<br>`;
            }
        }
        
        if (onlineGame) {
            try {
                const game = JSON.parse(onlineGame);
                debugHTML += `Room Code: ${game.roomCode || 'N/A'}<br>`;
                debugHTML += `Room ID: ${game.roomId || 'N/A'}<br>`;
                debugHTML += `Online Players Count: ${game.players ? game.players.length : 0}<br>`;
            } catch (e) {
                debugHTML += `Online Game: PARSE ERROR<br>`;
            }
        }
        
        document.getElementById('debugInfo').innerHTML = debugHTML;
        
        // Timer and redirect logic
        let countdown = 5;
        const timerEl = document.getElementById('timerDisplay');
        const actionEl = document.getElementById('actionMessage');
        
        if (mode === 'NONE') {
            actionEl.textContent = 'No game mode set! Redirecting to menu...';
            timerEl.textContent = `Redirecting in ${countdown} seconds...`;
            
            const interval = setInterval(() => {
                countdown--;
                timerEl.textContent = `Redirecting in ${countdown} seconds...`;
                
                if (countdown <= 0) {
                    clearInterval(interval);
                    window.location.href = 'index.html';
                }
            }, 1000);
            
        } else if (isImplemented) {
            actionEl.textContent = 'Loading game...';
            timerEl.textContent = `Starting in ${countdown} seconds...`;
            
            const interval = setInterval(() => {
                countdown--;
                timerEl.textContent = `Starting in ${countdown} seconds...`;
                
                if (countdown <= 0) {
                    clearInterval(interval);
                    window.location.href = 'game.html';
                }
            }, 1000);
            
        } else {
            actionEl.textContent = 'This mode is not yet implemented. Returning to menu...';
            timerEl.textContent = `Redirecting in ${countdown} seconds...`;
            
            const interval = setInterval(() => {
                countdown--;
                timerEl.textContent = `Redirecting in ${countdown} seconds...`;
                
                if (countdown <= 0) {
                    clearInterval(interval);
                    window.location.href = 'index.html';
                }
            }, 1000);
        }
    </script>
</body>
</html>
